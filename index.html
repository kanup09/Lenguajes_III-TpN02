<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP2 - Carousel Bootstrap</title>
    <style>
        .carousel-item img {
            height: 700px;
            /* Ajusta este valor a tu gusto */
            object-fit: cover;
            /* Esto evita que la imagen se deforme al recortarse */
        }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <header class="container mt-3">
        <div id="miCarrusel" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="hamster.jfif" class="d-block w-100" alt="Slide 1">
                </div>
                <div class="carousel-item">
                    <img src="hamsterSelfie.jpg" class="d-block w-100" alt="Slide 2">
                </div>
                <div class="carousel-item">
                    <img src="hamsterSombrero.jfif" class="d-block w-100" alt="Slide 3">
                </div>
            </div>

            <button class="carousel-control-prev" type="button" data-bs-target="#miCarrusel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Anterior</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#miCarrusel" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Siguiente</span>
            </button>
        </div>
    </header>
    <main class="container my-5">
        <h2>Información del Proyecto</h2>
        <p>Este es el cuerpo del trabajo práctico donde se desarrolla la información relevante del sitio.</p>
    </main>

    <footer class="bg-dark text-white text-center py-3">
        <div class="container">
            <p>Contacto: info@u-catolica-salta.edu.ar</p>
            <small>Información tomada de la Cátedra Lenguaje III </small>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
